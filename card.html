<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>بطاقة التواصل</title>
<meta name="theme-color" content="#0d0d1a"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ===== DARK THEME (default) ===== */
:root {
  --bg: #0b0b14;
  --surface: #13131f;
  --surface2: #1a1a2a;
  --border: #2a2a42;
  --accent: #7c6fff;
  --accent2: #b09eff;
  --text: #f0f0ff;
  --text2: #8888aa;
  --text3: #555577;
  --shadow: rgba(0,0,0,0.4);
}
/* ===== LIGHT THEME ===== */
[data-theme="light"] {
  --bg: #f4f4f8;
  --surface: #ffffff;
  --surface2: #eeeef5;
  --border: #dddde8;
  --accent: #6c5fff;
  --accent2: #8877ff;
  --text: #1a1a2e;
  --text2: #666688;
  --text3: #aaaacc;
  --shadow: rgba(0,0,0,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'IBM Plex Sans Arabic', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ===== LOADING ===== */
#loading {
  position: fixed; inset: 0; background: var(--bg); z-index: 9999;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== THEME TOGGLE ===== */
.theme-toggle {
  position: fixed; top: 1rem; left: 1rem; z-index: 100;
  width: 42px; height: 42px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  transition: all 0.2s;
  box-shadow: 0 2px 12px var(--shadow);
}
.theme-toggle:hover { transform: scale(1.1); }

/* ===== PAGE WRAPPER ===== */
.page {
  max-width: 440px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== PROFILE CARD ===== */
.profile-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2.5rem 1.5rem 2rem;
  text-align: center;
  margin-bottom: 1rem;
  box-shadow: 0 4px 24px var(--shadow);
  position: relative;
  overflow: hidden;
}
.profile-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 120px;
  background: linear-gradient(135deg, var(--accent) 0%, #e040fb 100%);
  opacity: 0.12;
}

.avatar-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 1.25rem;
}
.avatar {
  width: 100px; height: 100px;
  border-radius: 50%;
  border: 3px solid var(--accent);
  object-fit: cover;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--accent), #e040fb);
  font-size: 2.2rem; color: white; font-weight: 700;
  box-shadow: 0 0 0 4px var(--surface), 0 4px 20px var(--shadow);
}
.avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

.name {
  font-size: 1.6rem; font-weight: 700;
  margin-bottom: 0.3rem;
  letter-spacing: -0.02em;
}
.profession {
  color: var(--accent2);
  font-size: 0.88rem; font-weight: 500;
  margin-bottom: 0.75rem;
}
.description {
  color: var(--text2);
  font-size: 0.85rem; line-height: 1.7;
  margin-bottom: 0.75rem;
}
.address {
  color: var(--text3);
  font-size: 0.78rem;
}

/* ===== QUICK ACTIONS ===== */
.quick-row {
  display: flex; gap: 0.75rem;
  margin-bottom: 1rem;
}
.quick-btn {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1rem 0.5rem;
  text-align: center;
  text-decoration: none;
  color: var(--text);
  transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 0.35rem;
  box-shadow: 0 2px 8px var(--shadow);
  cursor: pointer;
}
.quick-btn:hover { transform: translateY(-2px); border-color: var(--accent); }
.quick-btn .q-icon { font-size: 1.4rem; }
.quick-btn .q-label { font-size: 0.72rem; color: var(--text2); }

/* ===== SHARE BTN ===== */
.share-btn {
  width: 100%; padding: 0.875rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  color: var(--text2);
  font-size: 0.88rem; font-weight: 500;
  cursor: pointer; font-family: inherit;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  margin-bottom: 1rem;
  box-shadow: 0 2px 8px var(--shadow);
}
.share-btn:hover { border-color: var(--accent); color: var(--text); }

/* ===== SOCIAL LINKS ===== */
.links-wrap { display: flex; flex-direction: column; gap: 0.6rem; }

.social-link {
  display: flex; align-items: center; gap: 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0.9rem 1.1rem;
  text-decoration: none;
  color: var(--text);
  transition: all 0.22s;
  box-shadow: 0 2px 8px var(--shadow);
}
.social-link:hover {
  border-color: var(--c, var(--accent));
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--shadow);
}
.s-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--c, var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.15rem; flex-shrink: 0;
}
.s-info { flex: 1; min-width: 0; }
.s-name { font-size: 0.92rem; font-weight: 600; }
.s-handle {
  font-size: 0.72rem; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  direction: ltr; text-align: left;
}
.s-arrow { color: var(--text3); font-size: 0.85rem; flex-shrink: 0; }

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  color: var(--text3);
  font-size: 0.72rem;
  margin-top: 2rem;
}

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 0.65rem 1.4rem;
  font-size: 0.85rem;
  z-index: 9999;
  transition: transform 0.3s;
  white-space: nowrap;
  box-shadow: 0 4px 20px var(--shadow);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== NOT FOUND ===== */
.not-found {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 2rem;
  gap: 1rem;
}

@media (max-width: 480px) {
  .page { padding: 1rem 0.75rem 2.5rem; }
  .name { font-size: 1.4rem; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
</div>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="تغيير الوضع">🌙</button>

<div id="root"></div>
<div class="toast" id="toast"></div>

<script>
/* ===== THEME ===== */
const saved = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', saved);
document.getElementById('themeToggle').textContent = saved === 'dark' ? '🌙' : '☀️';

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
}

/* ===== SOCIAL CONFIG ===== */
const SOCIALS = {
  instagram: { name: 'Instagram', color: '#E1306C', icon: '📸' },
  facebook:  { name: 'Facebook',  color: '#1877F2', icon: '📘' },
  tiktok:    { name: 'TikTok',    color: '#555',    icon: '🎵' },
  whatsapp:  { name: 'WhatsApp',  color: '#25D366', icon: '💬' },
  telegram:  { name: 'Telegram',  color: '#229ED9', icon: '✈️' },
  youtube:   { name: 'YouTube',   color: '#FF0000', icon: '▶️' },
  linkedin:  { name: 'LinkedIn',  color: '#0A66C2', icon: '💼' },
  snapchat:  { name: 'Snapchat',  color: '#FFBB00', icon: '👻' },
  twitter:   { name: 'X',         color: '#333',    icon: '𝕏'  },
  website:   { name: 'Website',   color: '#6c63ff', icon: '🌐' },
};

function getUrl(key, val) {
  if (!val) return null;
  if (key === 'whatsapp') {
    const n = val.replace(/[^\d+]/g, '').replace(/^\+/, '');
    return `https://wa.me/${n}`;
  }
  return val.startsWith('http') ? val : 'https://' + val;
}

function getHandle(val) {
  if (!val) return '';
  try {
    const u = new URL(val.startsWith('http') ? val : 'https://' + val);
    return (u.hostname + u.pathname).replace(/^www\./, '');
  } catch { return val; }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function share(c) {
  if (navigator.share) {
    navigator.share({ title: c.name, url: location.href }).catch(() => {});
  } else {
    navigator.clipboard.writeText(location.href);
    toast('✅ تم نسخ الرابط');
  }
}

function slug() {
  return location.pathname.replace('/card/', '').replace(/\/$/, '');
}

function render(c) {
  document.title = c.name + ' | بطاقة رقمية';

  const initials = c.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const avatarHTML = c.photo
    ? `<div class="avatar"><img src="${c.photo}" alt="${c.name}"/></div>`
    : `<div class="avatar">${initials}</div>`;

  // active links
  const linkItems = Object.entries(c.links || {})
    .filter(([k, v]) => v && v.trim())
    .map(([k, v]) => {
      const cfg = SOCIALS[k] || { name: k, color: '#6c63ff', icon: '🔗' };
      const url = getUrl(k, v);
      const handle = k === 'whatsapp' ? v : getHandle(v);
      return `
        <a class="social-link" href="${url}" target="_blank" rel="noopener" style="--c:${cfg.color}">
          <div class="s-icon">${cfg.icon}</div>
          <div class="s-info">
            <div class="s-name">${cfg.name}</div>
            <div class="s-handle">${handle}</div>
          </div>
          <span class="s-arrow">↗</span>
        </a>`;
    }).join('');

  // quick actions
  let quickHTML = '';
  const qBtns = [];
  if (c.phone)        qBtns.push(`<a class="quick-btn" href="tel:${c.phone}"><span class="q-icon">📞</span><span class="q-label">اتصال</span></a>`);
  if (c.email)        qBtns.push(`<a class="quick-btn" href="mailto:${c.email}"><span class="q-icon">✉️</span><span class="q-label">بريد</span></a>`);
  if (c.links?.whatsapp) qBtns.push(`<a class="quick-btn" href="${getUrl('whatsapp', c.links.whatsapp)}" target="_blank"><span class="q-icon">💬</span><span class="q-label">واتساب</span></a>`);
  if (qBtns.length) quickHTML = `<div class="quick-row">${qBtns.join('')}</div>`;

  document.getElementById('root').innerHTML = `
    <div class="page">

      <div class="profile-card">
        <div class="avatar-wrap">${avatarHTML}</div>
        <h1 class="name">${c.name}</h1>
        ${c.profession ? `<p class="profession">💼 ${c.profession}</p>` : ''}
        ${c.description ? `<p class="description">${c.description}</p>` : ''}
        ${c.address ? `<p class="address">📍 ${c.address}</p>` : ''}
      </div>

      ${quickHTML}

      <button class="share-btn" onclick='share(${JSON.stringify(c).replace(/</g,"\\u003c")})'>
        🔗 مشاركة البطاقة
      </button>

      <div class="links-wrap">
        ${linkItems}
      </div>

      <div class="footer">بطاقة رقمية · NFC Cards</div>
    </div>`;
}

async function init() {
  const s = slug();
  if (!s) { show404(); return; }
  try {
    const res = await fetch(`/api/client/${s}`);
    if (!res.ok) throw 0;
    const c = await res.json();
    render(c);
    document.getElementById('loading').style.display = 'none';
  } catch {
    show404();
  }
}

function show404() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('root').innerHTML = `
    <div class="not-found">
      <div style="font-size:4rem">😔</div>
      <h2>البطاقة غير موجودة</h2>
      <p style="color:var(--text2)">هذا الرابط غير صالح أو تم حذف البطاقة</p>
    </div>`;
}

init();
</script>
</body>
</html>
